[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Enable pretty URLs
[[redirects]]
  from = "/quiz"
  to = "/quiz.html"
  status = 301

[[redirects]]
  from = "/study-plan"
  to = "/studyplan.html"
  status = 301

[[redirects]]
  from = "/topics"
  to = "/topics.html"
  status = 301
